<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Folio+ — Portfolios confidentiels pour designers freelance</title>
    <meta
      name="description"
      content="Folio+ est une plateforme de portfolios à accès contrôlé pour designers freelance. Partagez vos projets confidentiels avec les personnes que vous choisissez."
    />
    <meta name="author" content="Folio+" />
    <meta property="og:title" content="Folio+ — Portfolios confidentiels pour designers freelance" />
    <meta
      property="og:description"
      content="Partagez vos projets confidentiels avec les personnes que vous choisissez. Une galerie de nuit pour un travail précieux."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@1,500&display=swap"
    />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("folio-theme");
          var c = document.documentElement.classList;
          c.remove("light", "dark");
          var d;
          if (t === "light") {
            d = false;
          } else if (t === "dark") {
            d = true;
          } else {
            d = window.matchMedia("(prefers-color-scheme: dark)").matches;
          }
          c.add(d ? "dark" : "light");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
