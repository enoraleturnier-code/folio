    <script>
      // TEMPORAIRE (C.1) : "Clair"/"Système" desactives cote ThemeToggle --
      // force "dark" a l'arrivee sur toute page, quels que soient le
      // localStorage ou le matchMedia systeme. Ne pas retirer ce commentaire
      // en reactivant : la logique complete (t === "light"/"dark"/matchMedia)
      // est a restaurer en meme temps que les options du menu.
      (function () {
        try {
          var c = document.documentElement.classList;
          c.remove("light", "dark");
          c.add("dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
